<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="Benjamin Lampe">
<meta name="description" content="CIE Engineered Controls Explorer — a browser-based dashboard for navigating the Cyber-Informed Engineering Engineered Controls Database across all 18 DHS Critical Infrastructure sectors.">
<meta name="copyright" content="Batelle Energy Alliance, LLC">
<meta name="owner" content="Idaho National Laboratory">
<meta name="contact" content="benjamin.lampe@inl.gov">
<meta name="organization" content="Idaho National Laboratory, Cyber-Informed Engineering Program">
<meta property="og:title" content="CIE Engineered Controls Explorer">
<meta property="og:description" content="Browser-based dashboard for the Cyber-Informed Engineering Engineered Controls Database — Idaho National Laboratory.">
<meta property="og:type" content="website">
<title>CIE Engineered Controls Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f7f3;--bg3:#f1efe8;
  --text:#1a1918;--text2:#5f5e5a;--text3:#888780;
  --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.2);
  --a50:#faeeda;--a100:#fac775;--a200:#ef9f27;--a400:#ba7517;--a600:#854f0b;
  --t50:#e1f5ee;--t100:#9fe1cb;--t400:#1d9e75;--t600:#0f6e56;
  --c50:#faece7;--c100:#f5c4b3;--c400:#d85a30;--c600:#993c1d;
  --g50:#eaf3de;--g100:#c0dd97;--g400:#639922;--g600:#3b6d11;
  --b50:#e6f1fb;--b100:#b5d4f4;--b400:#378add;--b600:#185fa5;
  --gy50:#f1efe8;--gy100:#d3d1c7;--gy600:#5f5e5a;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--text:#f0eee8;--text2:#b4b2a9;--text3:#888780;--bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.2)}
}
body{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.5}
button,input{font-family:inherit;color:var(--text)}button{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ROOT */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid var(--bd);background:var(--bg2);flex-shrink:0;gap:10px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-ico{width:32px;height:32px;border-radius:8px;background:var(--a50);border:1px solid var(--a100);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700;color:var(--a400)}
.hdr-t{font-size:14px;font-weight:600}.hdr-m{font-size:11px;color:var(--text3);font-family:monospace}
.hdr-r{display:flex;align-items:center;gap:6px}
.bsm{padding:4px 10px;font-size:12px;border-radius:7px;border:1px solid var(--bd2);background:none;color:var(--text2)}
.bsm:hover{background:var(--bg3)}
.tax-badge{padding:3px 8px;font-size:11px;border-radius:5px;background:var(--g50);border:1px solid var(--g100);color:var(--g600);font-weight:500}
.tax-badge.missing{background:var(--c50);border-color:var(--c100);color:var(--c600)}

/* HIERARCHY ZONE */
.hz{background:var(--bg2);border-bottom:2px solid var(--bd2);flex-shrink:0;overflow:hidden}
.hz-bc{display:flex;align-items:center;gap:4px;padding:7px 16px;border-bottom:1px solid var(--bd);font-size:12px;flex-wrap:wrap}
.bc-link{color:var(--b400);cursor:pointer;font-weight:500}
.bc-link:hover{text-decoration:underline}
.bc-sep{color:var(--text3);margin:0 2px}
.bc-cur{color:var(--text2);font-weight:500}
.bc-clear{padding:2px 8px;font-size:11px;border:1px solid var(--bd2);border-radius:5px;background:none;color:var(--text3);cursor:pointer}
.bc-clear:hover{background:var(--bg3)}
.bc-btns{margin-left:auto;display:flex;align-items:center;gap:5px}
.bc-toggle{padding:2px 8px;font-size:11px;border:1px solid var(--bd2);border-radius:5px;background:none;color:var(--b400);cursor:pointer;font-weight:500}
.bc-toggle:hover{background:var(--b50)}
.hz-rows-wrap{overflow:hidden;transition:max-height 0.38s ease-in-out}
.hz-row{display:flex;align-items:stretch;border-bottom:1px solid var(--bd);animation:slideIn 0.18s ease}
.hz-row:last-child{border-bottom:none}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.hz-lbl{width:80px;min-width:80px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);border-right:1px solid var(--bd);padding:6px 4px;text-align:center}
.hz-cards{flex:1;display:flex;overflow-x:auto;gap:7px;padding:8px 10px;align-items:stretch}
.hz-cards::-webkit-scrollbar{height:3px}

/* CARDS */
.card{background:var(--bg);border:1.5px solid var(--bd2);border-radius:10px;padding:10px 12px;cursor:pointer;transition:opacity .15s,border-color .15s,background .15s,box-shadow .15s;flex-shrink:0;display:flex;flex-direction:column;gap:4px}
.card:hover{border-color:var(--a200);background:var(--a50)}
.card.sel{border-color:var(--a400);background:var(--a50);box-shadow:0 0 0 3px rgba(186,117,23,.12)}
.card:hover > .card-n{color:#1a1918 !important}
.card.sel > .card-n{color:#1a1918 !important}
.card.dim{opacity:.35}
.card.dim:hover{opacity:.72;border-color:var(--a100)}
.card-n{font-size:12px;font-weight:600;line-height:1.3;color:var(--text)}
.card-v{font-size:18px;font-weight:700;font-family:monospace;color:var(--a400);line-height:1}
.card-sub{font-size:10px;color:var(--text3);line-height:1.2}
.card-bar{height:3px;border-radius:2px;background:var(--bd2);overflow:hidden;margin-top:2px}
.card-fill{height:100%;background:var(--t400);border-radius:2px;transition:width .3s}
/* card sizes by level */
.lv1 .card{width:180px}
.lv2 .card{width:160px}
.lv3 .card{width:145px}
.lv4 .card{width:135px}
.lv5 .card{width:125px}
.lv5 .card-v{font-size:15px}

/* NO-TAX PROMPT */
.notax{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:12px;color:var(--text2)}
.notax input[type=file]{display:none}
.notax-btn{padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid var(--bd2);background:none;color:var(--text2);cursor:pointer}
.notax-btn:hover{background:var(--bg3)}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sb{width:220px;min-width:220px;border-right:1px solid var(--bd);background:var(--bg2);overflow-y:auto;padding:10px 8px;flex-shrink:0}
.sb-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sb-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);display:flex;align-items:center;gap:5px}
.fb{background:var(--a200);color:var(--a600);border-radius:10px;padding:0 6px;font-size:10px;font-weight:600}
.clr{font-size:11px;border:none;background:none;color:var(--text3);text-decoration:underline;padding:0;cursor:pointer}
.fss{border-bottom:1px solid var(--bd);padding-bottom:7px;margin-bottom:7px}
.fsb{background:none;border:none;padding:2px 0;width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;cursor:pointer}
.fo{display:flex;justify-content:space-between;align-items:center;padding:3px 5px;border-radius:5px;cursor:pointer;margin-bottom:1px;border:1px solid transparent}
.fo:hover{background:var(--bg3)}.fo.on{background:var(--a50);border-color:var(--a100);color:#1a1918}
.fo input[type=radio]{accent-color:var(--a400);width:11px;height:11px;margin:0;cursor:pointer}
.fo-l{display:flex;align-items:center;gap:4px;font-size:12px}.fo-c{font-size:10px;color:var(--text3);font-family:monospace}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tbar{display:flex;align-items:center;gap:7px;padding:7px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sw{position:relative;flex:1;max-width:460px}
.si{width:100%;padding:6px 10px 6px 28px;border:1px solid var(--bd2);border-radius:7px;background:var(--bg);font-size:13px;outline:none}
.si:focus{border-color:var(--a400);box-shadow:0 0 0 2px rgba(186,117,23,.12)}
.tg{display:flex;gap:2px;background:var(--bg2);border-radius:7px;padding:2px;border:1px solid var(--bd)}
.tbb{padding:4px 12px;border-radius:5px;border:none;background:none;font-size:13px;cursor:pointer;color:var(--text2)}
.tbb.on{background:var(--bg);font-weight:500;color:var(--text);box-shadow:0 0 0 1px var(--bd2)}
.rc{font-size:12px;color:var(--text3);font-family:monospace;white-space:nowrap;margin-left:auto}

/* TABLE */
.tw{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{position:sticky;top:0;padding:6px 9px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;background:var(--bg2);border-bottom:1px solid var(--bd2);cursor:pointer;user-select:none;white-space:nowrap;z-index:1}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--bd);cursor:pointer}
tbody tr:hover td{background:var(--b50)!important}
@media(prefers-color-scheme:dark){tbody tr:hover td{background:rgba(55,138,221,.1)!important}}
tbody tr:nth-child(even) td{background:var(--bg2)}
tbody td{padding:6px 9px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0}
.empty{padding:48px 20px;text-align:center;color:var(--text3);font-size:14px}
.pg{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-top:1px solid var(--bd);background:var(--bg2);flex-shrink:0}
.pgi{font-size:12px;color:var(--text3);font-family:monospace}
.pgb{display:flex;gap:2px}
.pb{padding:3px 8px;border:1px solid var(--bd2);border-radius:4px;background:none;font-size:13px}
.pb:disabled{opacity:.3;cursor:default}.pb:not(:disabled):hover{background:var(--bg3)}

/* BADGES */
.bdg{display:inline-block;padding:2px 6px;font-size:11px;font-weight:500;border-radius:4px;white-space:nowrap;line-height:1.5}
.bt{background:var(--t50);border:1px solid var(--t100);color:var(--t600)}
.ba{background:var(--a50);border:1px solid var(--a100);color:var(--a400)}
.bc_{background:var(--c50);border:1px solid var(--c100);color:var(--c600)}
.bg_{background:var(--g50);border:1px solid var(--g100);color:var(--g600)}
.bgy{background:var(--gy50);border:1px solid var(--gy100);color:var(--gy600)}
.bb{background:var(--b50);border:1px solid var(--b100);color:var(--b600)}
.bxs{font-size:10px;padding:1px 5px}

/* UPLOAD */
.upl{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.ucard{text-align:center;max-width:580px;width:100%}
.uh{font-size:22px;font-weight:600;margin-bottom:8px}
.up{color:var(--text2);line-height:1.7;margin-bottom:20px}
.uslots{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.uslot{background:var(--bg2);border:2px dashed var(--bd2);border-radius:12px;padding:20px 16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
.uslot:hover,.uslot.over{border-color:var(--a400);background:var(--a50)}
.uslot.done{border-color:var(--g400);border-style:solid;background:var(--g50)}
.uslot-ico{font-size:28px;margin-bottom:8px}
.uslot-t{font-size:13px;font-weight:600;margin-bottom:4px}
.uslot-s{font-size:11px;color:var(--text3)}
.uslot-done{font-size:11px;color:var(--g600);font-weight:500;margin-top:4px}
.bup{padding:10px 24px;font-size:14px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg2);color:var(--text);font-weight:500}
.bup:hover:not(:disabled){background:var(--bg3)}
.bup:disabled{opacity:.4;cursor:default}

/* DETAIL PANEL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;justify-content:flex-end}
.dp{background:var(--bg);width:460px;max-width:95vw;height:100%;overflow-y:auto;display:flex;flex-direction:column;border-left:1px solid var(--bd2)}
.dph{padding:13px 15px;border-bottom:1px solid var(--bd);background:var(--bg);position:sticky;top:0;z-index:1}
.dpbr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.dpn{font-weight:600;font-size:15px;line-height:1.4;padding-right:34px}
.dpcl{position:absolute;top:11px;right:12px;border:1px solid var(--bd2);background:none;border-radius:6px;padding:4px 8px;font-size:13px;line-height:1}
.dpcl:hover{background:var(--bg2)}
.dpb{padding:13px 15px;flex:1}
.dpg{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;padding:10px 12px;background:var(--bg2);border-radius:8px;margin-bottom:12px}
.dpfl{font-size:11px;color:var(--text3);margin-bottom:2px}
.dpfv{font-size:13px;font-weight:500;line-height:1.4}
.dps{margin-bottom:12px}
.dpst{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:6px}
.dptx{line-height:1.7;font-size:13px;color:var(--text2)}
.dpct{margin-top:12px;padding:10px 12px;background:var(--bg2);border-radius:8px;border-left:3px solid var(--a200)}
.rr{display:flex;flex-wrap:wrap;gap:5px}

/* ANALYTICS */
.av{flex:1;overflow-y:auto;padding:12px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--bg2);border-radius:8px;padding:10px 12px}
.scl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:2px}
.scv{font-size:20px;font-weight:600;font-family:monospace}
.scs{font-size:11px;color:var(--text3);margin-top:1px}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.cc{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.cct{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}

.loading{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text2);font-size:15px}

/* FOOTER */
.footer{display:flex;align-items:center;justify-content:space-between;padding:5px 16px;border-top:1px solid var(--bd);background:var(--bg2);flex-shrink:0;font-size:11px;color:var(--text3);gap:8px}
.footer-items{display:flex;align-items:center;gap:5px;flex-wrap:wrap;min-width:0}
.footer-dot{color:var(--bd2);flex-shrink:0}
.footer-prog{font-weight:600;color:var(--text2);white-space:nowrap}
.footer-field{color:var(--text3);white-space:nowrap}
.footer-email{color:var(--b400);text-decoration:none}
.footer-email:hover{text-decoration:underline}
.footer-ver{position:relative;flex-shrink:0}
.footer-vbtn{padding:2px 8px;font-size:11px;border:1px solid var(--bd2);border-radius:5px;background:none;color:var(--b400);cursor:pointer;font-weight:600;font-family:monospace;letter-spacing:.02em}
.footer-vbtn:hover{background:var(--b50)}
.footer-vbtn.open{background:var(--b50);border-color:var(--b400)}
.footer-popup{position:absolute;bottom:calc(100% + 7px);right:0;width:340px;background:var(--bg);border:1px solid var(--bd2);border-radius:10px;padding:12px 14px;box-shadow:0 4px 24px rgba(0,0,0,0.14);z-index:500}
.footer-popup-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px}
.footer-vitem{padding:8px 0;border-bottom:1px solid var(--bd)}
.footer-vitem:last-child{border-bottom:none;padding-bottom:0}
.footer-vitem-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.footer-vnum{font-size:12px;font-weight:700;color:var(--b400);font-family:monospace}
.footer-vdate{font-size:11px;color:var(--text3)}
.footer-vdesc{font-size:12px;color:var(--text2);line-height:1.5}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(function(){
var R=React,RD=ReactDOM;
var h=R.createElement,F=R.Fragment;
var us=R.useState,um=R.useMemo,uc=R.useCallback,ur=R.useRef,ue=R.useEffect;

var ROLES=["Prevent impact","Enhance detection/monitoring","Control degradation slope","Redirect toward recovery","Accelerate recovery","Enable adaptation"];
var RCOLS=["#378ADD","#1D9E75","#BA7517","#7F77DD","#D85A30","#D4537E"];
var LVL_NAMES=["","Sector","Subsector","Segment","Subsegment","Asset"];
var PAGE=25;

/* ==================== DATA UTILS ==================== */

function detectType(json){
  if(Array.isArray(json)&&json.length>0&&json[0].ID!==undefined&&json[0].ParentID!==undefined) return "taxonomy";
  if(json&&json.data&&Array.isArray(json.data)) return "controls";
  return "unknown";
}

function flattenControls(data){
  var rows=[];
  for(var i=0;i<data.length;i++){
    var item=data[i];
    var base={scope_id:item.input_id,scope_title:item.title||"",scope_level:item.scope_level||"",brief_context:item.brief_context||""};
    var kiu=(item.engineered_controls&&item.engineered_controls.known_in_use)||[];
    var iop=(item.engineered_controls&&item.engineered_controls.ideas_opportunities)||[];
    for(var j=0;j<kiu.length;j++){
      var c=kiu[j];
      rows.push({id:rows.length,scope_id:base.scope_id,scope_title:base.scope_title,scope_level:base.scope_level,brief_context:base.brief_context,
        type:"Known",name:c.name||"",cf:c.critical_function||"",cat:c.category||"",
        desc:c.how_it_works||"",roles:c.resilience_roles||[],fs:c.fail_safe||"N/A",pri:null,notes:c.notes||""});
    }
    for(var k=0;k<iop.length;k++){
      var c2=iop[k];
      rows.push({id:rows.length,scope_id:base.scope_id,scope_title:base.scope_title,scope_level:base.scope_level,brief_context:base.brief_context,
        type:"Idea",name:c2.concept||c2.label||"",cf:c2.critical_function||"",cat:c2.category||"",
        desc:c2.rationale||"",roles:c2.expected_resilience_roles||[],fs:"N/A",pri:c2.priority_hint||null,notes:c2.implementation_notes||""});
    }
  }
  return rows;
}

function buildTree(nodes){
  var byId={};
  nodes.forEach(function(n){byId[n.ID]={id:n.ID,name:n.Name,scope:n.Scope,level:n.Level,outlineId:n.OutlineID,desc:n.Description||"",parentId:n.ParentID,children:[]};});
  var roots=[];
  nodes.forEach(function(n){
    if(n.ParentID===0)roots.push(byId[n.ID]);
    else if(byId[n.ParentID])byId[n.ParentID].children.push(byId[n.ID]);
  });
  return{byId:byId,roots:roots};
}

var _descCache={};
function getDescIds(nodeId,byId){
  if(_descCache[nodeId])return _descCache[nodeId];
  var ids=new Set();
  function tr(id){ids.add(id);var n=byId[id];if(n&&n.children)n.children.forEach(function(c){tr(c.id);});}
  tr(nodeId);
  _descCache[nodeId]=ids;
  return ids;
}

function precompCounts(tree,controls){
  var bySid={};
  controls.forEach(function(c){if(!bySid[c.scope_id])bySid[c.scope_id]=[];bySid[c.scope_id].push(c);});
  var counts={};
  function traverse(node){
    var total=0,known=0;
    var direct=bySid[node.id]||[];
    total+=direct.length;
    known+=direct.filter(function(c){return c.type==="Known";}).length;
    node.children.forEach(function(child){traverse(child);var cc=counts[child.id];total+=cc.total;known+=cc.known;});
    counts[node.id]={total:total,known:known,ideas:total-known};
  }
  tree.roots.forEach(traverse);
  return counts;
}

function filterByPath(controls,path,byId){
  if(!path||!path.length)return controls;
  var last=path[path.length-1];
  var ids=getDescIds(last,byId);
  return controls.filter(function(c){return ids.has(c.scope_id);});
}

function mkAnalytics(rows,tree,nodeCounts,path){
  var cats={},rc={},known=0,ideas=0;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.cat)cats[r.cat]=(cats[r.cat]||0)+1;

        h(HBar,{labels:a.roleData.map(function(d){return d.n.split(" ").slice(0,2).join(" ")}),values:a.roleData.map(function(d){return d.v}),colors:a.roleData.map(function(d){return d.c}),height:Math.max(240,a.roleData.length*38+50)}))
    ),
    h("div",{className:"cr"},
      a.hData&&a.hData.length>0&&h("div",{className:"cc"},h("div",{className:"cct"},hLabel),
        h(HBar,{labels:a.hData.map(function(d){return d.n}),values:a.hData.map(function(d){return d.v}),colors:"#378ADD",height:Math.max(280,a.hData.length*28+50)})),
      h("div",{className:"cc"},
        h("div",{className:"cct"},"Known vs ideas"),
        h(Donut,{data:a.typeData}),
        h("div",{style:{display:"flex",flexDirection:"column",gap:6,marginTop:10}},
          a.typeData.map(function(d,i){return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}},
            h("span",{style:{display:"flex",alignItems:"center",gap:6}},h("span",{style:{width:10,height:10,borderRadius:2,background:d.c,display:"inline-block"}}),h("span",{style:{color:"var(--text2)"}},d.n)),
            h("span",{style:{fontFamily:"monospace",fontWeight:600}},d.v.toLocaleString())
          )})
        )
      )
    )
  );
}

function Footer(p){
  var meta=p.meta;
  var os=us(false);var open=os[0],setOpen=os[1];
  if(!meta)return null;
  return h("div",{className:"footer"},
    h("div",{className:"footer-items"},
      h("span",{className:"footer-prog"},meta.programName),
      h("span",{className:"footer-dot"},"·"),
      h("span",{className:"footer-field"},meta.programTask),
      h("span",{className:"footer-dot"},"·"),
      h("span",{className:"footer-field"},meta.company),
      h("span",{className:"footer-dot"},"·"),
      h("span",{className:"footer-field"},meta.author),
      meta.authorEmail&&h(F,null,
        h("span",{className:"footer-dot"},"·"),
        h("a",{className:"footer-email",href:"mailto:"+meta.authorEmail},meta.authorEmail)
      )
    ),
    h("div",{className:"footer-ver"},
      h("button",{className:"footer-vbtn"+(open?" open":""),onClick:function(){setOpen(function(v){return !v})}},
        "v"+meta.version+" "+(open?"▾":"▴")
      ),
      open&&h("div",{className:"footer-popup"},
        h("div",{className:"footer-popup-title"},"Version history"),
        (meta.version_history||[]).slice().reverse().map(function(v,i){
          return h("div",{className:"footer-vitem",key:i},
            h("div",{className:"footer-vitem-hdr"},
              h("span",{className:"footer-vnum"},"v"+v.version_number),
              h("span",{className:"footer-vdate"},v.versionDate)
            ),
            h("div",{className:"footer-vdesc"},v.version_desc)
          );
        })
      )
    )
  );
}

/* ==================== APP ==================== */

function App(){
  // Data state
  var rs=us(null);var appData=rs[0],setAppData=rs[1];
  // appData = {controls:[], tree:null, nodeCounts:null}

  var ls=us(false);var loading=ls[0],setLoad=ls[1];
  // Auto-load bundled data files (GitHub Pages friendly)
  var als=us(true);var autoLoading=als[0],setAutoLoading=als[1];
  var aes=us("");var autoErr=aes[0],setAutoErr=aes[1];

  // UI state
  var qs=us("");var search=qs[0],setSearch=qs[1];
  var fst=us({type:"",level:"",role:"",pri:"",failsafe:""});var filt=fst[0],setFilt=fst[1];
  var sels=us(null);var sel=sels[0],setSel=sels[1];
  var tabs=us("controls");var tab=tabs[0],setTab=tabs[1];
  var paths=us([]);var path=paths[0],setPath=paths[1];
  var cfr=ur(null);var tfr=ur(null);

  function onLoad(controlsJson,taxonomyJson){
    setLoad(true);
    setTimeout(function(){
      var controls=flattenControls(controlsJson.data||[]);
      var tree=null,nodeCounts=null;
      if(taxonomyJson){
        _descCache={};
        tree=buildTree(taxonomyJson);
        nodeCounts=precompCounts(tree,controls);
      }
      setAppData({controls:controls,tree:tree,nodeCounts:nodeCounts,
        ctrlsMeta:{
          name:controlsJson.programName||"Controls DB",
          version:controlsJson.version,
          total:controls.length,
          programName:controlsJson.programName||"",
          programTask:controlsJson.programTask||"",
          company:controlsJson.company||"",
          author:controlsJson.author||"",
          authorEmail:controlsJson.authorEmail||"",
          version_history:controlsJson.version_history||[]
        }});
      setLoad(false);
    },10);
  }

  function onTaxLoad(taxonomyJson){
    if(!appData)return;
    _descCache={};
    var tree=buildTree(taxonomyJson);
    var nodeCounts=precompCounts(tree,appData.controls);
    setAppData(function(d){return{controls:d.controls,tree:tree,nodeCounts:nodeCounts,ctrlsMeta:d.ctrlsMeta};});
  }

  // Automatically load the bundled controls DB (engctrls-V2_JSON.zip) and IDF taxonomy (idf.min.json) on first mount.
  ue(function(){
    var cancelled=false;
    // Paths are relative to this HTML file (gui/), so they work on GitHub Pages.
    var TAX_URL="idf.min.json";
    var ZIP_URL="../data/engctrls-V2_JSON.zip";
    var ZIP_ENTRY="engctrls-V2.json";

    function fetchTaxonomy(){
      return fetch(TAX_URL).then(function(r){
        if(!r.ok)throw new Error("Could not load "+TAX_URL+" ("+r.status+")");
        return r.json();
      });
    }
    function fetchControls(){
      if(typeof JSZip==="undefined")return Promise.reject(new Error("JSZip library failed to load"));
      return fetch(ZIP_URL).then(function(r){
        if(!r.ok)throw new Error("Could not load "+ZIP_URL+" ("+r.status+")");
        return r.arrayBuffer();
      }).then(function(buf){
        return JSZip.loadAsync(buf);
      }).then(function(zip){
        var entry=zip.file(ZIP_ENTRY);
        if(!entry)throw new Error(ZIP_ENTRY+" not found inside the archive");
        return entry.async("string");
      }).then(function(txt){
        return JSON.parse(txt);
      });
    }

    Promise.all([fetchControls(),fetchTaxonomy()]).then(function(res){
      if(cancelled)return;
      setAutoLoading(false);
      onLoad(res[0],res[1]);
    }).catch(function(err){
      if(cancelled)return;
      console.warn("Auto-load failed, falling back to manual upload:",err);
      setAutoErr(err&&err.message?err.message:String(err));
      setAutoLoading(false);
    });

    return function(){cancelled=true;};
  },[]);

  function sf(k,v){setFilt(function(f){var n={};Object.keys(f).forEach(function(kk){n[kk]=f[kk]});n[k]=v;return n});}
  function ca(){setFilt({type:"",level:"",role:"",pri:"",failsafe:""});setSearch("");}

  var ac=Object.values(filt).filter(Boolean).length+(search?1:0);

  // Derive filtered controls
  var filtered=um(function(){
    if(!appData)return[];
    var r=appData.controls;
    // 1. Hierarchy path filter
    if(appData.tree&&path.length>0){
      r=filterByPath(r,path,appData.tree.byId);
    }
    // 2. Search
    var q=search.toLowerCase();
    if(q)r=r.filter(function(x){return x.name.toLowerCase().indexOf(q)>-1||x.cat.toLowerCase().indexOf(q)>-1||x.desc.toLowerCase().indexOf(q)>-1||x.cf.toLowerCase().indexOf(q)>-1||x.scope_title.toLowerCase().indexOf(q)>-1});
    // 3. Sidebar filters
    if(filt.type)r=r.filter(function(x){return x.type===filt.type});
    if(filt.level)r=r.filter(function(x){return x.scope_level===filt.level});
    if(filt.role)r=r.filter(function(x){return x.roles.indexOf(filt.role)>-1});
    if(filt.pri)r=r.filter(function(x){return x.pri===filt.pri});
    if(filt.failsafe)r=r.filter(function(x){return x.fs===filt.failsafe});
    return r;
  },[appData,path,search,filt]);

  var an=um(function(){
    if(!appData)return null;
    return mkAnalytics(filtered,appData.tree,appData.nodeCounts,path);
  },[filtered,appData,path]);

  if(autoLoading&&!appData)return h("div",{className:"loading"},"Loading engineered controls database, please wait...");
  if(loading)return h("div",{className:"loading"},"Parsing and building hierarchy, please wait...");
  if(!appData)return h(Upload,{onLoad:onLoad,autoErr:autoErr});

  var hasTax=appData.tree!=null;
  var meta=appData.ctrlsMeta;

  return h(F,null,
    sel&&h(Detail,{item:sel,onClose:function(){setSel(null)}}),
    h("div",{id:"app",style:{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}},

      // Header
      h("div",{className:"hdr"},
        h("div",{className:"hdr-l"},
          h("div",{className:"hdr-ico"},"CIE"),
          h("div",null,
            h("div",{className:"hdr-t"},"Engineered Controls Explorer"),
            meta&&h("div",{className:"hdr-m"},meta.name+" - v"+meta.version+" - "+meta.total.toLocaleString()+" records")
          )
        ),
        h("div",{className:"hdr-r"},
          h("span",{className:"tax-badge"+(hasTax?"":" missing")},hasTax?"Taxonomy loaded":"No taxonomy"),
          h("input",{ref:cfr,type:"file",accept:".json",onChange:function(e){
            var file=e.target.files[0];if(!file)return;
            var reader=new FileReader();
            reader.onload=function(ev){try{var j=JSON.parse(ev.target.result);if(j.data)onLoad(j,appData.tree?null:null);}catch(e){}};
            reader.readAsText(file);
          },style:{display:"none"}}),
          h("button",{className:"bsm",onClick:function(){cfr.current.click()}},"Reload files")
        )
      ),

      // Hierarchy browser
      hasTax
        ?h(HierarchyBrowser,{tree:appData.tree,counts:appData.nodeCounts,path:path,onPath:function(p2){setPath(p2);setSel(null);}})
        :h(NoTaxPrompt,{onLoad:onTaxLoad}),

      // Body
      h("div",{className:"body"},
        h(Sidebar,{all:filtered,filt:filt,sf:sf,ca:ca,cnt:ac}),
        h("div",{className:"main"},
          h("div",{className:"tbar"},
            h("div",{className:"sw"},
              h("span",{style:{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",color:"var(--text3)",fontSize:12,pointerEvents:"none"}},"S:"),
              h("input",{className:"si",value:search,onChange:function(e){setSearch(e.target.value)},placeholder:"Search controls, categories, functions..."})
            ),
            h("div",{className:"tg"},
              h("button",{className:"tbb"+(tab==="controls"?" on":""),onClick:function(){setTab("controls")}},"Controls"),
              h("button",{className:"tbb"+(tab==="analytics"?" on":""),onClick:function(){setTab("analytics")}},"Analytics")
            ),
            tab==="controls"&&h("span",{className:"rc"},filtered.length.toLocaleString()+" shown")
          ),
          tab==="controls"
            ?h(Table,{rows:filtered,onSel:function(row){setSel(row)}})
            :an&&h(Analytics,{a:an,tree:appData.tree,path:path})
        )
      ),
      h(Footer,{meta:appData?appData.ctrlsMeta:null})
    )
  );
}

RD.createRoot(document.getElementById("app")).render(h(App));
})();
</script>
</body>
</html>
